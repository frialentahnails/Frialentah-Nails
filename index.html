<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frialentahs Nails</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Frialentahs Nails</h1>
    <p>Where your nails meet paradise ✨</p>
    <a href="sms:6787248587" class="phone-link">💬 Text for questions</a>
  </header>

  <!-- SERVICES -->
  <section class="services">
    <h2>Our Services</h2>

    <div class="service-item">
      <button type="button">French</button>
      <p class="price">$30</p>
    </div>

    <div class="service-item">
      <button type="button">Ombré</button>
      <p class="price">$35</p>
    </div>

    <div class="service-item">
      <button type="button">Plain</button>
      <p class="price">$25</p>
    </div>

    <div class="service-item">
      <button type="button">Full Detailed</button>
      <p class="price">$45</p>
    </div>

    <div class="service-item">
      <button type="button">Junks</button>
      <p class="price">$40</p>
    </div>

    <div class="service-item">
      <button type="button">Minimal Detail</button>
      <p class="price">$35</p>
    </div>
  </section>

  <!-- BOOKING -->
  <section class="booking">
    <h2>Book Your Appointment</h2>

    <form id="bookingForm" action="https://formsubmit.co/heathergrant202@gmail.com" method="POST">

      <label>Full Name</label>
      <input type="text" name="name" required>

      <label>Phone Number</label>
      <input type="tel" name="phone" required>

      <label>Select Service</label>
      <select id="service" name="service" required>
        <option value="">Choose one</option>
        <option>French</option>
        <option>Ombré</option>
        <option>Plain</option>
        <option>Full Detailed</option>
        <option>Junks</option>
        <option>Minimal Detail</option>
      </select>

      <label>Appointment Date</label>
      <input type="date" id="date" name="date" required>

      <label>Preferred Time</label>
      <input type="time" id="time" name="time" required>

      <input type="hidden" name="_captcha" value="false">

      <button type="submit" class="book-btn">Book Appointment</button>
    </form>
  </section>

  <!-- PAYMENT -->
  <section class="payment">
    <h2>Payment</h2>
    <p><strong>$heather5366</strong></p>
    <img src="cashapp-qr.jpeg" class="qr-code" alt="Cash App QR Code">
  </section>

  <!-- REVIEWS (NO FAKE ONES) -->
  <section class="reviews">
    <h2>Client Reviews 💖</h2>
    <p style="color:#ff4da6; font-weight:bold;">
      Be the first to leave a review ✨
    </p>
  </section>

  <!-- REVIEW FORM -->
  <section class="add-review">
    <h2>Leave a Review ✨</h2>

    <form action="https://formsubmit.co/heathergrant202@gmail.com" method="POST">

      <input type="text" name="name" placeholder="Your Name" required>

      <textarea name="review" placeholder="Write your review..." required></textarea>

      <select name="rating" required>
        <option value="">Rating</option>
        <option>★★★★★</option>
        <option>★★★★☆</option>
        <option>★★★☆☆</option>
        <option>★★☆☆☆</option>
        <option>★☆☆☆☆</option>
      </select>

      <input type="hidden" name="_captcha" value="false">

      <button type="submit">Submit Review</button>
    </form>
  </section>

  <!-- SCRIPT -->
  <script>
    // auto-fill service buttons
    document.querySelectorAll(".service-item button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById("service").value = btn.textContent;
      });
    });

    // prevent past dates
    const dateInput = document.getElementById("date");
    dateInput.min = new Date().toISOString().split("T")[0];

    // submit + redirect to thank you page
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();

      fetch(this.action, {
        method: "POST",
        body: new FormData(this)
      }).then(() => {
        window.location.href = "thankyou.html";
      });
    });
  </script>

</body>
</html>
